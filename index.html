<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회복지 프로그램 캘린더 (아이돌봄팀 색상 변경)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --card-bg: #f8f9fa;
            --primary-color: #4a90e2;
            --sunday-color: #e74c3c;
            --saturday-color: #3498db;
            --inactive-bg: #eeeeee;
            --inactive-text: #aaaaaa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #f0f0f0;
                --border-color: #444444;
                --card-bg: #2d2d2d;
                --inactive-bg: #333333;
                --inactive-text: #666666;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; padding: 20px; }

        #printTitle { display: none; text-align: center; margin-bottom: 20px; font-size: 25pt; font-weight: bold; color: #000; }

        .no-print { margin-bottom: 20px; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed var(--border-color); padding: 20px; text-align: center; cursor: pointer; flex-grow: 1; transition: background 0.2s; }
        .upload-zone:hover { background: var(--card-bg); }
        
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        select, input, button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); cursor: pointer; }
        
        .btn-print { background: var(--primary-color); color: white; border: none; font-weight: bold; }
        .btn-reset { background: #666; color: white; border: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border-color); }
        .stat-card small { display: block; font-size: 0.8rem; color: #888; }

        .filter-section { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        
        .team-chip { 
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid transparent; 
            cursor: pointer; transition: all 0.2s ease; font-weight: 600;
        }
        .team-chip.inactive { 
            background-color: var(--inactive-bg) !important; color: var(--inactive-text) !important;
            border-color: var(--border-color); opacity: 0.6;
        }

        .calendar-container { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border-color); }
        .calendar-container th, .calendar-container td { border: 1px solid var(--border-color); vertical-align: top; width: 14.285%; }
        .calendar-container th { padding: 10px; background: var(--card-bg); font-weight: bold; }
        .calendar-container th:nth-child(1) { color: var(--sunday-color); }
        .calendar-container th:nth-child(7) { color: var(--saturday-color); }

        .day-cell { min-height: 110px; position: relative; padding: 5px; }
        .day-num { font-weight: bold; margin-bottom: 5px; display: block; }
        .sun { color: var(--sunday-color); }
        .sat { color: var(--saturday-color); }

        .program-item { 
            font-size: 0.75rem; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
        }

        .tooltip { position: absolute; display: none; background: white; border: 1px solid #333; padding: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: #333; border-radius: 4px; }

        @media print {
            .no-print { display: none !important; }
            #printTitle { display: block !important; }
            .calendar-container th, .calendar-container td { border: 1px solid #000 !important; }
            .program-item { white-space: normal !important; word-break: break-all !important; display: block !important; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body>

<h1 id="printTitle">프로그램 캘린더</h1>

<div class="no-print">
    <h2>사회복지 프로그램 관리</h2>
    <div class="header-section">
        <div id="dropZone" class="upload-zone">
            엑셀 파일을 드래그하거나 클릭하여 업로드하세요 (.xlsx)
            <input type="file" id="fileInput" accept=".xlsx" style="display:none">
        </div>
        <div class="controls">
            <input type="number" id="yearInput" value="2026" style="width: 80px;">
            <select id="monthInput">
                <option value="0">1월</option><option value="1">2월</option>
                <option value="2" selected>3월</option><option value="3">4월</option>
                <option value="4">5월</option><option value="5">6월</option>
                <option value="6">7월</option><option value="7">8월</option>
                <option value="8">9월</option><option value="9">10월</option>
                <option value="10">11월</option><option value="11">12월</option>
            </select>
            <button onclick="renderCalendar()">달력 갱신</button>
            <button class="btn-print" onclick="window.print()">PDF/인쇄</button>
            <button class="btn-reset" onclick="resetData()">전체 삭제</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>총 프로그램</small><strong id="stat-total">0</strong></div>
        <div class="stat-card"><small>운영 일수</small><strong id="stat-days">0</strong></div>
        <div class="stat-card"><small>참여 팀</small><strong id="stat-teams">0</strong></div>
    </div>

    <div class="filter-section">
        <span>팀 필터:</span>
        <div id="teamFilters" style="display: inline-flex; gap: 8px;"></div>
    </div>
    <div class="filter-section">
        <span>장소 필터:</span>
        <select id="placeFilter" onchange="renderCalendar()">
            <option value="all">전체 장소</option>
        </select>
    </div>
</div>

<table class="calendar-container">
    <thead><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr></thead>
    <tbody id="calendarBody"></tbody>
</table>

<div id="tooltip" class="tooltip"></div>

<script>
    let rawExcelData = []; 
    let teamSettings = {
        '가족사례팀': { bg: '#B5D4F4', text: '#042C53' },
        '가족교육문화팀': { bg: '#C0DD97', text: '#173404' },
        '지역공동체팀': { bg: '#FAC775', text: '#412402' },
        '운영지원팀': { bg: '#F4C0D1', text: '#4B1528' },
        '아이돌봄팀': { bg: '#D7BDE2', text: '#4A235A' }, // 연보라색으로 변경
        '공동육아나눔터': { bg: '#CECBF6', text: '#26215C' },
        '기타': { bg: '#E5E8E8', text: '#424949' }
    };
    
    // 신규 팀 자동 배정용 여분 팔레트 (기존과 안 겹치도록 보강)
    const extraPalette = [
        { bg: '#F9E79F', text: '#7D6608' }, { bg: '#A9DFBF', text: '#145A32' }, 
        { bg: '#AED6F1', text: '#1B4F72' }, { bg: '#F5B7B1', text: '#78281F' },
        { bg: '#9FE1CB', text: '#04342C' }
    ];

    let activeFilters = new Set(['all']);

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#eee'; };
    dropZone.ondragleave = () => { dropZone.style.background = 'transparent'; };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.style.background = 'transparent';
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    };

    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets["프로그램입력"];
            if(!sheet) { alert("'프로그램입력' 시트를 찾을 수 없습니다."); return; }
            rawExcelData = XLSX.utils.sheet_to_json(sheet, { range: 2 });
            initFilters();
            renderCalendar();
        };
        reader.readAsArrayBuffer(file);
    }

    const dayMap = { '일': 0, '월': 1, '화': 2, '수': 3, '목': 4, '금': 5, '토': 6 };

        rawExcelData.forEach(row => {
