<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회복지 프로그램 캘린더</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --card-bg: #f8f9fa;
            --primary-color: #4a90e2;
            --sunday-color: #e74c3c;
            --saturday-color: #3498db;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #f0f0f0;
                --border-color: #444444;
                --card-bg: #2d2d2d;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; padding: 20px; }

        #printTitle { 
            display: none; 
            text-align: center; 
            margin-bottom: 15px; 
            font-size: 25pt; 
            font-weight: bold; 
            color: #000;
        }

        .no-print { margin-bottom: 20px; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed var(--border-color); padding: 20px; text-align: center; cursor: pointer; flex-grow: 1; transition: background 0.2s; }
        .upload-zone:hover { background: var(--card-bg); }
        
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        select, input, button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); cursor: pointer; }
        button:hover { opacity: 0.8; }
        .btn-print { background: var(--primary-color); color: white; border: none; font-weight: bold; }
        .btn-reset { background: #666; color: white; border: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border-color); }
        .stat-card small { display: block; font-size: 0.8rem; color: #888; }
        .stat-card strong { font-size: 1.2rem; }

        .filter-section { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        .team-chip { padding: 4px 10px; border-radius: 15px; font-size: 0.85rem; border: none; cursor: pointer; transition: transform 0.1s; }
        .team-chip.inactive { opacity: 0.3; filter: grayscale(0.5); }

        /* 화면용 기본 설정 */
        .calendar-container { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; 
            border: 1px solid var(--border-color); 
        }
        .calendar-container th, .calendar-container td { 
            border: 1px solid var(--border-color); 
            vertical-align: top;
            width: 14.285%; 
        }
        .calendar-container th { padding: 10px; background: var(--card-bg); font-weight: bold; }
        .calendar-container th:nth-child(1) { color: var(--sunday-color); }
        .calendar-container th:nth-child(7) { color: var(--saturday-color); }

        .day-cell { min-height: 110px; position: relative; padding: 5px; overflow: hidden; }
        .day-num { font-weight: bold; margin-bottom: 5px; display: block; }
        .sun { color: var(--sunday-color); }
        .sat { color: var(--saturday-color); }

        .program-item { 
            font-size: 0.75rem; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
        }
        .more-count { font-size: 0.7rem; color: #888; padding-left: 4px; }

        .tooltip { 
            position: absolute; display: none; background: white; border: 1px solid #333; padding: 10px; 
            z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: #333; min-width: 150px; border-radius: 4px;
        }

        /* 🖨️ 인쇄 최적화 - 강제 너비 고정 로직 강화 */
        @media print {
            @page { margin: 10mm; size: auto; }
            .no-print { display: none !important; }
            #printTitle { display: block !important; }
            body { padding: 0; background: white !important; color: black !important; }
            
            .calendar-container { 
                border: 2px solid #000 !important; 
                width: 100% !important; 
                table-layout: fixed !important; /* 강제 고정 */
                border-collapse: collapse !important;
            }

            /* 인쇄 시 모든 셀의 너비를 소수점까지 동원해 강제 고정 */
            .calendar-container th, 
            .calendar-container td { 
                width: 14.285% !important; 
                min-width: 14.285% !important;
                max-width: 14.285% !important;
                border: 1px solid #000 !important;
                overflow: visible !important;
            }
            
            .day-cell { 
                min-height: 120px !important;
                height: auto !important;
                display: block !important;
                width: 100% !important;
            }
            
            .program-item { 
                font-size: 9pt !important;
                white-space: normal !important; 
                word-break: break-all !important; /* 내용이 길어도 너비를 유지하며 줄바꿈 */
                border: 1px solid #ccc !important;
                margin-bottom: 3px;
                padding: 3px 5px !important;
                display: block !important;
                width: 100% !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .more-count { display: none !important; } 
            .day-num { font-size: 11pt; border-bottom: 1px solid #eee; margin-bottom: 5px; width: 100%; }
        }
    </style>
</head>
<body>
