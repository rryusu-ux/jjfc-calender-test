<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회복지 프로그램 캘린더</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --card-bg: #f8f9fa;
            --primary-color: #4a90e2;
            --sunday-color: #e74c3c;
            --saturday-color: #3498db;
            --inactive-bg: #eeeeee;
            --inactive-text: #aaaaaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; padding: 20px; }

        #printTitle { display: none; text-align: center; margin-bottom: 20px; font-size: 25pt; font-weight: bold; }
        .no-print { margin-bottom: 20px; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed var(--border-color); padding: 20px; text-align: center; cursor: pointer; flex-grow: 1; transition: background 0.2s; }
        .upload-zone:hover { background: var(--card-bg); }
        
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        select, input, button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); cursor: pointer; }
        .btn-print { background: var(--primary-color); color: white; border: none; font-weight: bold; }

        .filter-section { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        .team-chip { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid transparent; cursor: pointer; transition: all 0.2s ease; font-weight: 600; }
        .team-chip.inactive { background-color: var(--inactive-bg) !important; color: var(--inactive-text) !important; opacity: 0.6; }

        .calendar-container { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border-color); }
        .calendar-container th, .calendar-container td { border: 1px solid var(--border-color); vertical-align: top; width: 14.285%; }
        .calendar-container th { padding: 10px; background: var(--card-bg); font-weight: bold; }
        .calendar-container th:nth-child(1) { color: var(--sunday-color); }
        .calendar-container th:nth-child(7) { color: var(--saturday-color); }

        .day-cell { min-height: 110px; position: relative; padding: 5px; }
        .day-num { font-weight: bold; margin-bottom: 5px; display: block; }
        .sun { color: var(--sunday-color); }
        .sat { color: var(--saturday-color); }

        .program-item { font-size: 0.75rem; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .tooltip { position: absolute; display: none; background: white; border: 1px solid #333; padding: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); color: #333; border-radius: 4px; }

        @media print {
            .no-print { display: none !important; }
            #printTitle { display: block !important; }
            .calendar-container th, .calendar-container td { border: 1px solid #000 !important; }
            .program-item { white-space: normal !important; word-break: break-all !important; display: block !important; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body>

<h1 id="printTitle">프로그램 캘린더</h1>

<div class="no-print">
    <div class="header-section">
        <div id="dropZone" class="upload-zone">엑셀 파일을 드래그하거나 클릭하여 업로드하세요 (.xlsx)</div>
        <input type="file" id="fileInput" accept=".xlsx" style="display:none">
        <div class="controls">
            <input type="number" id="yearInput" value="2026" style="width: 80px;">
            <select id="monthInput">
                <option value="0">1월</option><option value="1">2월</option>
                <option value="2" selected>3월</option><option value="3">4월</option>
                <option value="4">5월</option><option value="5">6월</option>
                <option value="6">7월</option><option value="7">8월</option>
                <option value="8">9월</option><option value="9">10월</option>
                <option value="10">11월</option><option value="11">12월</option>
            </select>
            <button onclick="renderCalendar()">달력 갱신</button>
            <button class="btn-print" onclick="window.print()">인쇄/PDF</button>
        </div>
    </div>

    <div class="filter-section">
        <span>팀 필터:</span>
        <div id="teamFilters" style="display: inline-flex; gap: 8px;"></div>
    </div>
    <div class="filter-section">
        <span>장소 필터:</span>
        <select id="placeFilter" onchange="renderCalendar()"><option value="all">전체 장소</option></select>
    </div>
</div>

<table class="calendar-container">
    <thead><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr></thead>
    <tbody id="calendarBody"></tbody>
</table>

<div id="tooltip" class="tooltip"></div>

<script>
    let rawExcelData = []; 
    // 요청하신 팀별 지정 색상 적용
    const teamSettings = {
        '지역공동체팀': { bg: '#B5D4F4', text: '#042C53' },
        '가족교육문화팀': { bg: '#C0DD97', text: '#173404' },
        '가족사례팀': { bg: '#FAC775', text: '#412402' },
        '아이돌봄팀': { bg: '#F4C0D1', text: '#4B1528' },
        '공동육아나눔터': { bg: '#D7BDE2', text: '#4A235A' },
        '운영지원팀': { bg: '#CECBF6', text: '#26215C' },
        '기타': { bg: '#E5E8E8', text: '#424949' }
    };

    // 요청하신 필터 나열 순서
    const targetOrder = ['운영지원팀', '가족사례팀', '가족교육문화팀', '지역공동체팀', '아이돌봄팀', '공동육아나눔터', '기타'];

    let activeFilters = new Set(['all']);

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#eee'; };
    dropZone.ondragleave = () => { dropZone.style.background = 'transparent'; };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.style.background = 'transparent';
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    };

    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]]; // 첫 번째 시트 자동 선택
            rawExcelData = XLSX.utils.sheet_to_json(sheet, { range: 2 });
            initFilters();
            renderCalendar();
        };
        reader.readAsArrayBuffer(file);
    }

    function initFilters() {
        const foundTeams = [...new Set(rawExcelData.map(p => p['팀명'] || '기타'))];
        const places = [...new Set(rawExcelData.map(p => p['장소'] || '미지정'))];
        
        // 지정된 순서대로 정렬
        const sortedTeams = foundTeams.sort((a, b) => {
            let indexA = targetOrder.indexOf(a);
            let indexB = targetOrder.indexOf(b);
            return (indexA === -1 ? 99 : indexA) - (indexB === -1 ? 99 : indexB);
        });

        const filterContainer = document.getElementById('teamFilters');
        filterContainer.innerHTML = `<button class="team-chip" onclick="toggleFilter('all')" data-team="all">전체</button>`;
        
        sortedTeams.forEach(team => {
            const btn = document.createElement('button');
            btn.className = 'team-chip';
            btn.innerText = team;
            btn.setAttribute('data-team', team);
            btn.onclick = () => toggleFilter(team);
            filterContainer.appendChild(btn);
        });

        const placeSelect = document.getElementById('placeFilter');
        placeSelect.innerHTML = '<option value="all">전체 장소</option>';
        places.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p;
            placeSelect.appendChild(opt);
        });
        updateFilterUI();
    }

    function toggleFilter(team) {
        if(team === 'all') activeFilters = new Set(['all']);
        else {
            activeFilters.delete('all');
            if(activeFilters.has(team)) activeFilters.delete(team);
            else activeFilters.add(team);
            if(activeFilters.size === 0) activeFilters.add('all');
        }
        updateFilterUI();
        renderCalendar();
    }

    function updateFilterUI() {
        document.querySelectorAll('.team-chip').forEach(btn => {
            const teamName = btn.getAttribute('data-team');
            if (activeFilters.has(teamName)) {
                btn.classList.remove('inactive');
                btn.style.backgroundColor = teamName === 'all' ? 'var(--primary-color)' : (teamSettings[teamName]?.bg || '#eee');
                btn.style.color = teamName === 'all' ? 'white' : (teamSettings[teamName]?.text || '#333');
            } else {
                btn.classList.add('inactive');
                btn.style.backgroundColor = ''; btn.style.color = '';
            }
        });
    }

    function renderCalendar() {
        const year = parseInt(document.getElementById('yearInput').value);
        const month = parseInt(document.getElementById('monthInput').value);
        const placeF = document.getElementById('placeFilter').value;
        const lastDate = new Date(year, month + 1, 0).getDate();
        
        let processed = [];
        const dayMap = { '일': 0, '월': 1, '화': 2, '수': 3, '목': 4, '금': 5, '토': 6 };

        rawExcelData.forEach(row => {
            const teamName = row['팀명'] || '기타';
            const dayNum = parseInt(row['날짜(일)']);
            const weekDaysStr = row['요일'] ? String(row['요일']) : "";
            
            if (!isNaN(dayNum)) { processed.push({ ...row, team: teamName, day: dayNum }); } 
            else if (weekDaysStr.trim() !== "") {
                const targetDays = weekDaysStr.split(',').map(s => s.trim());
                for (let d = 1; d <= lastDate; d++) {
                    if (targetDays.some(t => dayMap[t] === new Date(year, month, d).getDay())) 
                        processed.push({ ...row, team: teamName, day: d });
                }
            }
        });

        const filtered = processed.filter(p => (activeFilters.has('all') || activeFilters.has(p.team)) && (placeF === 'all' || p['장소'] === placeF));
        
        const firstDay = new Date(year, month, 1).getDay();
        const tbody = document.getElementById('calendarBody');
        tbody.innerHTML = '';

        let date = 1;
        for (let i = 0; i < 6; i++) {
            let row = document.createElement('tr');
            for (let j = 0; j < 7; j++) {
                let cell = document.createElement('td');
                if ((i === 0 && j < firstDay) || date > lastDate) {
                    cell.innerHTML = '<div class="day-cell"></div>';
                } else {
                    const daily = filtered.filter(p => p.day === date);
                    const progHtml = daily.map(p => `
                        <div class="program-item" style="background:${teamSettings[p.team]?.bg || '#eee'}; color:${teamSettings[p.team]?.text || '#333'}"
                             onmouseover="showTooltip(event, '${p['프로그램명']}', '${p['시간']}', '${p['장소']}', '${p.team}')" onmouseout="hideTooltip()">
                             <strong>${p['시간']}</strong> ${p['프로그램명']}
                        </div>`).join('');
                    const dClass = j === 0 ? 'sun' : (j === 6 ? 'sat' : '');
                    cell.innerHTML = `<div class="day-cell"><span class="day-num ${dClass}">${date}</span>${progHtml}</div>`;
                    date++;
                }
                row.appendChild(cell);
            }
            tbody.appendChild(row);
            if (date > lastDate) break;
        }
    }

    function showTooltip(e, name, time, place, team) {
        const tt = document.getElementById('tooltip');
        tt.innerHTML = `<strong>${name}</strong><br>🕒 ${time}<br>📍 ${place}<br>👥 ${team}`;
        tt.style.display = 'block'; tt.style.left = (e.pageX + 10) + 'px'; tt.style.top = (e.pageY + 10) + 'px';
    }
    function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
    window.onload = renderCalendar;
</script>
</body>
</html>
